name: Repository 5 - Unified Night Cycle (12h Offset) (04:00 AM IST)
on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

concurrency:
  group: daily-docker-2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x script.sh

      - name: Determine Execution Mode
        id: mode
        env:
          MATRIX_DB_HOST: ${{ secrets.MATRIX_DB_HOST }}
        run: |
          if [ -n "$MATRIX_DB_HOST" ] && [ "$MATRIX_DB_HOST" != "null" ]; then
             echo "EXECUTION_MODE=DYNAMIC" >> $GITHUB_ENV
             echo "Execution Mode: DYNAMIC (Matrix DB Bootstrapper)"
          else
             echo "EXECUTION_MODE=LEGACY" >> $GITHUB_ENV
             echo "Execution Mode: LEGACY (Manual GitHub Secrets)"
          fi

      - name: Matrix DB Bootstrapper (Dynamic Mode)
        id: bootstrapper
        if: env.EXECUTION_MODE == 'DYNAMIC'
        env:
          ORCHESTRATOR_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
          MATRIX_DB_HOST: ${{ secrets.MATRIX_DB_HOST }}
        run: |
          echo "Contacting Matrix DB for Pod Environment..."
          curl -s -H "Authorization: Bearer $ORCHESTRATOR_TOKEN" "$MATRIX_DB_HOST/api/farm/runner-env?group=$GROUP_ID" > runner_env.json

          # Inject all variables directly into the runner memory!
          echo "ACCOUNT_4=$(jq -r .account_4 runner_env.json)" >> $GITHUB_ENV
          echo "ACCOUNT_5=$(jq -r .account_5 runner_env.json)" >> $GITHUB_ENV
          echo "ACCOUNT_6=$(jq -r .account_6 runner_env.json)" >> $GITHUB_ENV

          echo "SESSION_RESTORE_URL_FOUR=$(jq -r .restore_url_4 runner_env.json)" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_FIVE=$(jq -r .restore_url_5 runner_env.json)" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_SIX=$(jq -r .restore_url_6 runner_env.json)" >> $GITHUB_ENV

          echo "DISCORD_WEBHOOK_URL=$(jq -r .discord_webhook_url runner_env.json)" >> $GITHUB_ENV

          echo "Successfully injected secrets from Matrix DB!"

      - name: Legacy Secret Injector (Legacy Mode)
        id: legacy
        if: env.EXECUTION_MODE == 'LEGACY'
        env:
          ACCOUNT_4: ${{ secrets.ACCOUNT_4 }}
          ACCOUNT_5: ${{ secrets.ACCOUNT_5 }}
          ACCOUNT_6: ${{ secrets.ACCOUNT_6 }}
          SESSION_RESTORE_URL_FOUR: ${{ secrets.SESSION_RESTORE_URL_FOUR }}
          SESSION_RESTORE_URL_FIVE: ${{ secrets.SESSION_RESTORE_URL_FIVE }}
          SESSION_RESTORE_URL_SIX: ${{ secrets.SESSION_RESTORE_URL_SIX }}
          SCRIPT_URL_FOUR: ${{ secrets.SCRIPT_URL_FOUR }}
          SCRIPT_URL_FIVE: ${{ secrets.SCRIPT_URL_FIVE }}
          SCRIPT_URL_SIX: ${{ secrets.SCRIPT_URL_SIX }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COLLECTOR_URL: ${{ secrets.COLLECTOR_URL }}
          COLLECTOR_TOKEN: ${{ secrets.COLLECTOR_TOKEN }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: |
          echo "Injecting standard GitHub Secrets into Environment..."
          echo "ACCOUNT_4=$ACCOUNT_4" >> $GITHUB_ENV
          echo "ACCOUNT_5=$ACCOUNT_5" >> $GITHUB_ENV
          echo "ACCOUNT_6=$ACCOUNT_6" >> $GITHUB_ENV

          echo "SESSION_RESTORE_URL_FOUR=$SESSION_RESTORE_URL_FOUR" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_FIVE=$SESSION_RESTORE_URL_FIVE" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_SIX=$SESSION_RESTORE_URL_SIX" >> $GITHUB_ENV

          echo "SCRIPT_URL_FOUR=$SCRIPT_URL_FOUR" >> $GITHUB_ENV
          echo "SCRIPT_URL_FIVE=$SCRIPT_URL_FIVE" >> $GITHUB_ENV
          echo "SCRIPT_URL_SIX=$SCRIPT_URL_SIX" >> $GITHUB_ENV

          echo "DISCORD_WEBHOOK_URL=$DISCORD_WEBHOOK_URL" >> $GITHUB_ENV

      - name: Calculate Daily Active Pod
        id: calculate
        env:
          GROUP_ID: ${{ secrets.GROUP_ID }}
          MATRIX_DB_HOST: ${{ secrets.MATRIX_DB_HOST }}
        run: |
          echo "JOB_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "IP=$(curl -s https://api.ipify.org)" >> $GITHUB_ENV

          # Dynamic rotation logic exactly like legacy
          DAY_NUM=$(date +%j | sed 's/^0*//')
          INDEX=$(( (DAY_NUM - 1) % 3 ))

          if [ "$INDEX" -eq 0 ]; then
             echo "Using five.sh -> Account 5"
             echo "ACTIVE_ACCOUNT=$ACCOUNT_5" >> $GITHUB_ENV
             echo "ACCOUNT_NAME=Account 5" >> $GITHUB_ENV
             if [ "$EXECUTION_MODE" == "DYNAMIC" ]; then
                echo "TARGET_SCRIPT_URL=$MATRIX_DB_HOST/api/farm/payload?group=$GROUP_ID&sequence=five" >> $GITHUB_ENV
             else
                echo "TARGET_SCRIPT_URL=$SCRIPT_URL_FIVE" >> $GITHUB_ENV
             fi
             echo "TARGET_RESTORE_URL=$SESSION_RESTORE_URL_FIVE" >> $GITHUB_ENV
          elif [ "$INDEX" -eq 1 ]; then
             echo "Using six.sh -> Account 6"
             echo "ACTIVE_ACCOUNT=$ACCOUNT_6" >> $GITHUB_ENV
             echo "ACCOUNT_NAME=Account 6" >> $GITHUB_ENV
             if [ "$EXECUTION_MODE" == "DYNAMIC" ]; then
                echo "TARGET_SCRIPT_URL=$MATRIX_DB_HOST/api/farm/payload?group=$GROUP_ID&sequence=six" >> $GITHUB_ENV
             else
                echo "TARGET_SCRIPT_URL=$SCRIPT_URL_SIX" >> $GITHUB_ENV
             fi
             echo "TARGET_RESTORE_URL=$SESSION_RESTORE_URL_SIX" >> $GITHUB_ENV
          else
             echo "Using four.sh -> Account 4"
             echo "ACTIVE_ACCOUNT=$ACCOUNT_4" >> $GITHUB_ENV
             echo "ACCOUNT_NAME=Account 4" >> $GITHUB_ENV
             if [ "$EXECUTION_MODE" == "DYNAMIC" ]; then
                echo "TARGET_SCRIPT_URL=$MATRIX_DB_HOST/api/farm/payload?group=$GROUP_ID&sequence=four" >> $GITHUB_ENV
             else
                echo "TARGET_SCRIPT_URL=$SCRIPT_URL_FOUR" >> $GITHUB_ENV
             fi
             echo "TARGET_RESTORE_URL=$SESSION_RESTORE_URL_FOUR" >> $GITHUB_ENV
          fi

      - name: Send IP to collector (Ingest)
        continue-on-error: true
        env:
          COLLECTOR_URL: ${{ secrets.COLLECTOR_URL }}
          COLLECTOR_TOKEN: ${{ secrets.COLLECTOR_TOKEN }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: |
          if [ -z "$COLLECTOR_URL" ] || [ "$COLLECTOR_URL" == "null" ] || [ "$COLLECTOR_URL" == "" ]; then
             echo "No Collector URL provided. Skipping."
             exit 0
          fi

          ACC="${ACTIVE_ACCOUNT:-${{ github.repository_owner }}}"
          ACC_LABEL="${ACCOUNT_NAME:-${{ github.repository_owner }}}"

          payload=$(jq -n \
            --arg account  "$ACC" \
            --arg label    "$ACC_LABEL" \
            --arg repo     "${{ github.repository }}" \
            --arg run_id   "${{ github.run_id }}" \
            --arg job      "${{ github.job }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg ip       "${IP:-unknown}" \
            --arg ts       "${JOB_START}" \
            '{account:$account,account_label:$label,repo:$repo,run_id:$run_id,job:$job,workflow:$workflow,ip:$ip,ts:$ts}')

          sig=$(printf "%s" "$payload" | openssl dgst -sha256 -hmac "$HMAC_SECRET" -binary | base64)

          curl -s -X POST "$COLLECTOR_URL/ingest" \
            -H "Authorization: Bearer $COLLECTOR_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Signature: $sig" \
            -d "$payload" || true

      - name: Ask collector if we should run (Gate)
        id: gate
        continue-on-error: true
        env:
          COLLECTOR_URL: ${{ secrets.COLLECTOR_URL }}
          COLLECTOR_TOKEN: ${{ secrets.COLLECTOR_TOKEN }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: |
          if [ -z "$COLLECTOR_URL" ] || [ "$COLLECTOR_URL" == "null" ] || [ "$COLLECTOR_URL" == "" ]; then
             echo "No Collector URL provided. Defaulting to SHOULD_RUN=true."
             echo "SHOULD_RUN=true" >> $GITHUB_ENV
             exit 0
          fi

          ACC="${ACTIVE_ACCOUNT:-${{ github.repository_owner }}}"
          ACC_LABEL="${ACCOUNT_NAME:-${{ github.repository_owner }}}"

          gate_payload=$(jq -n \
            --arg account  "$ACC" \
            --arg label    "$ACC_LABEL" \
            --arg repo     "${{ github.repository }}" \
            --arg run_id   "${{ github.run_id }}" \
            --arg job      "${{ github.job }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg ip       "${IP:-unknown}" \
            --arg ts       "${JOB_START}" \
            '{account:$account,account_label:$label,repo:$repo,run_id:$run_id,job:$job,workflow:$workflow,ip:$ip,ts:$ts}')

          gate_sig=$(printf "%s" "$gate_payload" | openssl dgst -sha256 -hmac "$HMAC_SECRET" -binary | base64)

          resp=$(curl -s -X POST "$COLLECTOR_URL/gate" \
            -H "Authorization: Bearer $COLLECTOR_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Signature: $gate_sig" \
            -d "$gate_payload" || echo '{}')

          should_run=$(echo "$resp" | jq -r '.should_run // "true"')
          reason=$(echo "$resp" | jq -r '.reason // ""')

          echo "SHOULD_RUN=$should_run" >> $GITHUB_ENV
          echo "GATE_REASON=$reason" >> $GITHUB_ENV

      - name: Abort early (Policy Check)
        if: env.SHOULD_RUN != 'true'
        run: |
          echo "Policy triggered: ${{ env.GATE_REASON }}. Skipping project run." >> $GITHUB_STEP_SUMMARY
          exit 0

      - name: Run Unified Dispatcher script
        if: env.SHOULD_RUN == 'true'
        env:
          ORCHESTRATOR_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
          PROJECT_NAME: '007-of-five'
          SESSION_COPY_DELAY: 3300 # Wait 95 minutes before copying sessions
          ENABLE_SESSION_UPLOAD: 'true' # Set to 'false' to disable artifact upload
          ENABLE_ARTIFACT_UPLOAD: 'true' # Upload as Build Artifact
          ENABLE_RELEASE_UPLOAD: 'false' # Upload to GitHub Release
          ENABLE_SESSION_RESTORE: 'false' # Set to 'true' to enable session restore (and disable upload)
        run: ./script.sh

      - name: Upload Sessions Artifact
        if: env.SHOULD_RUN == 'true' && env.ENABLE_ARTIFACT_UPLOAD == 'true' && env.ARTIFACT_CREATED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: sessions.zip
          retention-days: 5
